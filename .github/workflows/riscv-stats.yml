name: RISC-V Machine Stats

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  print-stats:
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: System Information
        run: |
          echo "### OS Information"
          uname -a
          cat /etc/os-release
          
          echo -e "\n### CPU Information"
          lscpu
          nproc
          cat /proc/cpuinfo
          
          echo -e "\n### Memory Information"
          free -h
          cat /proc/meminfo
          
          echo -e "\n### Storage Information"
          df -h
          lsblk
          
          echo -e "\n### Hardware Devices"
          ls /dev

      - name: Kubernetes Information
        run: |
          echo "### Kubernetes Environment Variables"
          env | grep -i KUBERNETES || echo "No Kubernetes environment variables found."
          
          echo -e "\n### Service Account Information"
          if [ -d /run/secrets/kubernetes.io/serviceaccount ]; then
            ls -la /run/secrets/kubernetes.io/serviceaccount
            echo "Service account token exists."
          else
            echo "No service account directory found."
          fi
          
          echo -e "\n### Container & Cgroup Info"
          cat /proc/self/cgroup | head -n 5
          cat /proc/self/mountinfo | grep -i kubernetes || echo "No k8s mounts found in mountinfo."
          
          echo -e "\n### Network Configuration"
          cat /etc/resolv.conf
          ip addr
          
          echo -e "\n### Kubectl Information (if available)"
          if command -v kubectl >/dev/null 2>&1; then
            kubectl version --client
            kubectl cluster-info || echo "Could not get cluster info (unauthorized or no cluster)."
            kubectl get pods || echo "Could not get pods (unauthorized or no cluster)."
          else
            echo "kubectl not found."
          fi

      - name: Security Audit & Boundary Discovery
        run: |
          echo "### Container Capabilities"
          grep Cap /proc/self/status
          
          echo -e "\n### RBAC Discovery (via API Server)"
          TOKEN=$(cat /run/secrets/kubernetes.io/serviceaccount/token)
          NAMESPACE=$(cat /run/secrets/kubernetes.io/serviceaccount/namespace)
          APISERVER=https://kubernetes.default.svc
          
          echo "Testing access to Namespace: $NAMESPACE"
          curl -sSk -H "Authorization: Bearer $TOKEN" "$APISERVER/api/v1/namespaces/$NAMESPACE" | jq -r '.status.phase' || echo "Access to namespace info denied or curl/jq error."
          
          echo -e "\nTesting Pod Listing in $NAMESPACE:"
          curl -sSk -H "Authorization: Bearer $TOKEN" "$APISERVER/api/v1/namespaces/$NAMESPACE/pods" | jq -r '.items[].metadata.name' || echo "Listing pods denied."
          
          echo -e "\n### Network Discovery"
          echo "Routing Table:"
          ip route
          echo -e "\nInternal DNS Check (Self):"
          getent hosts kubernetes.default.svc
          
          echo -e "\n### Infrastructure Identifiers"
          echo "Checking for Virtualization/Hypervisor clues..."
          lsmod | grep -E "kvm|virtio" || echo "No common virtio/kvm modules found."
          dmesg | grep -iE "hypervisor|virt" | head -n 10 || echo "dmesg access denied or no hypervisor string found."
          cat /proc/cpuinfo | grep -iE "flags|features" | head -n 5
